<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./styles/index.css">
  <title>Results summery</title>
  <link rel="icon" type="image/png" size="32x32" href="./assets/images/favicon-32x32.png">
</head>

<body>


  <div class="main">



    <div class="card card1">
      <p class="result">Your Result</p>

      <div class="score">
        <h1 class="line sc">76</h1>
        <p class="line of">of 100</p>
      </div>

      <h1 class="Great">Great</h1>
      <p class="lower">You scored higher than 65% of the people who have taken these tests.</p>

    </div>



    <div class="card card2">

      <h3>Summary</h3>


        <div class="tab reaction">
            <img src="./assets/images/icon-reaction.svg" width="15" alt="??" >
            <span class="r">Reaction</span>
            <span class="marks"><b>80</b> / 100</span>
        </div>


        <div class="tab memory">
            <img src="./assets/images/icon-memory.svg" width="15" alt="??">
            <span class="m">Memory</span>
            <span class="marks"><b>92</b> / 100</span>
        </div>


        <div class="tab verbal">
            <img src="./assets/images/icon-verbal.svg" width="15" alt="??">
            <span class="v">Verbal</span>
            <span class="marks"><b>61</b> / 100</span>
        </div>


        <div class="tab visual">
            <img src="./assets/images/icon-visual.svg" width="15" alt="??">
            <span class="vi">Visual</span>
            <span class="marks"><b>73</b> / 100</span>
        </div>

        <div class="button">
          Continue
        </div>


    </div>

  </div>

</body>

</html>
