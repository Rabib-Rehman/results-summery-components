<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results summery</title>
  <link rel="icon" type="image/png" size="32x32" href="./assets/images/favicon-32x32.png">
</head>
<body>


  <div class="main">



    <div class="card1">
      <p>Your Result</p>
      <p>76</p>
      <p>of 100</p>
      <h1>Great</h1>
      <p>You have scored higher than 65% of the people who have taken these tests.</p>

    </div>



    <div class="card2">

      <h2>Summary</h1>


        <div class="reaction">
          <div class="left">
            <img src="./assets/images/icon-reaction.svg" width="15" alt="??">
            <span>Reaction</span>
          </div>
          <div class="right">
            <p>80 / 100</p>
          </div>
        </div>


        <div class="memory">
          <div class="left">
            <img src="./assets/images/icon-memory.svg" width="15" alt="??">
            <span>Memory</span>
          </div>
          <div class="right">
            <p>92 / 100</p>
          </div>
        </div>


        <div class="verbal">
          <div class="left">
            <img src="./assets/images/icon-verbal.svg" width="15" alt="??">
            <span>Verbal</span>
          </div>
          <div class="right">
            <p>61 / 100</p>
          </div>
        </div>


        <div class="visual">
          <div class="left">
            <img src="./assets/images/icon-visual.svg" width="15" alt="??">
            <span>visual</span>
          </div>
          <div class="right">
            <p>73 / 100</p>
          </div>
        </div>

        <button>Continue</button>

    </div>

  </div>

</body>
</html>
